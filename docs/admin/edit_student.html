</head>
<body>

<div class="header">

    <div class="header-right">
        <a href="https://github.com/iamziyan/Nestify" class="github-btn" target="_blank">
            <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            <span>GitHub</span>
        </a>
    </div>
</div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="avatar">A</div>
            <div class="name">Admin User</div>
            <div class="role">Administrator</div>
        </div>
        <nav class="sidebar-nav">
            <a href="../dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
            <div class="sidebar-divider"></div>
            <a href="add_student.html"><span class="nav-icon">➕</span> Add Student</a>
            <a href="view_students.html"><span class="nav-icon">👥</span> View Students</a>
            <a href="add_room.html"><span class="nav-icon">🏠</span> Add Room</a>
            <a href="allocate_room.html"><span class="nav-icon">🔑</span> Allocate Room</a>
            <a href="view_requests.html"><span class="nav-icon">📩</span> Room Requests</a>
            <a href="../shared/view_rooms.html"><span class="nav-icon">🏢</span> View Rooms</a>
            <a href="add_notice.html"><span class="nav-icon">📢</span> Add Notice</a>
            <a href="../shared/view_notices.html"><span class="nav-icon">📋</span> View Notices</a>
            <a href="../shared/view_complaint.html"><span class="nav-icon">⚠️</span> View Complaints</a>
            <div class="sidebar-divider"></div>
            <a href="../login.html"><span class="nav-icon">🚪</span> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2 class="fade-in">Edit Student</h2>
        <p class="page-subtitle fade-in fade-in-delay-1">Update student profile and fee details.</p>

        <div class="glass-card fade-in fade-in-delay-2" style="max-width:600px;">
            <form action="view_students.html">
                <div class="form-group">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" value="Rahul Sharma">
                </div>
                <div class="form-group">
                    <label for="college">College Name</label>
                    <input type="text" id="college" value="MIT College">
                </div>
                <div class="form-group">
                    <label for="roll">Roll Number</label>
                    <input type="text" id="roll" value="2024BCA001">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" value="rahul@test.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" value="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender">
                        <option value="Boy" selected>Boy</option>
                        <option value="Girl">Girl</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <hr>
                <h3 style="margin-top:16px;">Fee Configuration</h3>
                <div class="form-group mt-2">
                    <label for="room_rent">Room Rent (₹)</label>
                    <input type="number" id="room_rent" value="2000">
                </div>
                <div class="form-group">
                    <label for="mess_fee">Mess Fee (₹)</label>
                    <input type="number" id="mess_fee" value="2500">
                </div>
                <div class="form-group">
                    <label for="maint_fee">Maintenance Fee (₹)</label>
                    <input type="number" id="maint_fee" value="500">
                </div>
                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" value="2026-04-20">
                </div>
                <div class="text-center">
                    <input type="submit" value="Update Student">
                </div>
            </form>
        </div>
    </main>
</div>

</body>
</html>
