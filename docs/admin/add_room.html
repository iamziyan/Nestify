        <h2 class="fade-in">Add Room</h2>

        <div class="glass-card fade-in fade-in-delay-2" style="max-width:500px;">
            <div class="form-group">
                <label for="room_no">Room Number</label>
                <input type="text" id="room_no" placeholder="A-201">
            </div>
            <div class="form-group">
                <label for="capacity">Capacity (Beds)</label>
                <input type="number" id="capacity" placeholder="4">
            </div>
            <div class="form-group">
                <label for="gender">Gender Type</label>
                <select id="gender">
                    <option value="Boy">Boy</option>
                    <option value="Girl">Girl</option>

                <input type="submit" value="Add Room">
