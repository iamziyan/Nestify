<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="avatar">R</div>
            <div class="name">Rahul Sharma</div>
            <div class="role">Student</div>
        </div>
        <nav class="sidebar-nav">
            <a href="../dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
            <div class="sidebar-divider"></div>
            <a href="../shared/view_rooms.html"><span class="nav-icon">🏢</span> View Rooms</a>
            <a href="pay_fee.html"><span class="nav-icon">💰</span> Pay Fee</a>
            <a href="add_complaint.html" class="active"><span class="nav-icon">📝</span> Submit Complaint</a>
            <a href="../shared/view_complaint.html"><span class="nav-icon">⚠️</span> My Complaints</a>

            <div class="sidebar-divider"></div>
            <a href="../login.html"><span class="nav-icon">🚪</span> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2 class="fade-in">Submit Complaint</h2>
        <p class="page-subtitle fade-in fade-in-delay-1">Report an issue or raise a complaint.</p>

        <div class="glass-card fade-in fade-in-delay-2" style="max-width:600px;">
            <form action="../shared/view_complaint.html">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Internet">Internet</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Cleanliness">Cleanliness</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="5" placeholder="Describe the issue in detail..." style="resize: vertical;"></textarea>
                </div>
                <div class="text-center">
                    <input type="submit" value="Submit Complaint">
                </div>
            </form>
        </div>
    </main>
</div>

</body>
